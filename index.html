<!DOCTYPE html>
<html>
<head>
<title>Project Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/supabaseClient.js"></script>

<style>

body{
background:#f4f7fb;
font-family:Segoe UI;
}

/* Sidebar */

.sidebar{
width:240px;
height:100vh;
background:white;
position:fixed;
border-right:1px solid #e5e7eb;
padding:20px;
}

.logo{
font-size:22px;
font-weight:600;
margin-bottom:30px;
}

.nav-item{
padding:10px;
border-radius:8px;
cursor:pointer;
margin-bottom:5px;
}

.nav-item:hover{
background:#eef2ff;
}

/* Main */

.main{
margin-left:240px;
}

/* Topbar */

.topbar{
background:white;
padding:15px 25px;
border-bottom:1px solid #e5e7eb;
display:flex;
justify-content:space-between;
}

/* Cards */

.project-card{
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
transition:0.2s;
}

.project-card:hover{
transform:translateY(-4px);
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">Project</div>

<div class="nav-item"><i class="bi bi-kanban"></i> Projects</div>
<div class="nav-item"><i class="bi bi-bar-chart"></i> Reports</div>
<div class="nav-item"><i class="bi bi-gear"></i> Settings</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h5>Projects</h5>

<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">
New Project
</button>

</div>

<div class="container mt-4">

<div class="row" id="projectGrid"></div>

</div>

</div>

<!-- ADD PROJECT MODAL -->

<div class="modal fade" id="addModal">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header">
<h5>Add Project</h5>
</div>

<div class="modal-body">
<input id="pname" class="form-control" placeholder="Project Name">
</div>

<div class="modal-footer">
<button class="btn btn-primary" onclick="saveProject()">Save</button>
</div>

</div>
</div>
</div>

<script>

async function loadProjects(){

let { data } = await supabaseClient
.from("projects")
.select("*")
.order("created_at",{ascending:false})

let html=""

data.forEach(p=>{

html+=`
<div class="col-md-4 mb-4">

<div class="project-card">

<h5>${p.project_name}</h5>

<p class="text-muted small">Active Project</p>

<button class="btn btn-outline-primary btn-sm"
onclick="openProject('${p.project_id}')">
Open
</button>

</div>

</div>
`

})

document.getElementById("projectGrid").innerHTML = html

}

async function saveProject(){

let name = document.getElementById("pname").value

await supabaseClient
.from("projects")
.insert([{project_name:name}])

location.reload()

}

function openProject(id){
location.href="dashboard.html?id="+id
}

loadProjects()

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
