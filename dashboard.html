<!DOCTYPE html>
<html>
<head>
<title>Project Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/supabaseClient.js"></script>

<style>

body{
background:#f4f7fb;
font-family:Segoe UI;
}

.header{
background:white;
padding:20px;
border-bottom:1px solid #e5e7eb;
}

.tab-btn{
border:1px solid #d1d5db;
padding:6px 14px;
border-radius:8px;
background:#f9fafb;
margin-right:6px;
}

.kpi{
background:#f9fafb;
padding:18px;
border-radius:12px;
}

.sprint-card{
background:#f9fafb;
padding:15px;
border-radius:12px;
}

.task-row{
padding:12px;
border-bottom:1px solid #eee;
display:flex;
justify-content:space-between;
}

</style>

</head>

<body>

<div class="header">

<h4 id="pname"></h4>
<div class="text-muted small">Project Management Module</div>

<div class="mt-3">

<button class="tab-btn">Dashboard</button>
<button class="tab-btn" onclick="openTasks()">Tasks</button>
<button class="tab-btn" onclick="openKanban()">Kanban</button>
<button class="tab-btn">Timeline</button>
<button class="tab-btn">Report</button>

</div>

</div>

<div class="container mt-4">

<!-- KPI -->

<div class="row mb-4">

<div class="col"><div class="kpi">Total Tasks<br><b id="t1">0</b></div></div>
<div class="col"><div class="kpi">Completed<br><b id="t2">0</b></div></div>
<div class="col"><div class="kpi">In Progress<br><b id="t3">0</b></div></div>
<div class="col"><div class="kpi">Not Started<br><b id="t4">0</b></div></div>

</div>

<!-- Progress -->

<div class="mb-4">
<div class="small">Overall progress</div>
<div class="progress">
<div id="prog" class="progress-bar"></div>
</div>
</div>

<!-- Sprints -->

<h6>Sprints</h6>
<div class="row mb-4" id="sprints"></div>

<!-- Tasks -->

<h6>All Tasks</h6>
<div class="card">
<div id="tasks"></div>
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search)
const projectId = params.get("id")

async function load(){

let { data:p } = await supabaseClient
.from("projects")
.select("*")
.eq("project_id",projectId)
.single()

document.getElementById("pname").innerHTML = p.project_name

let { data:tasks } = await supabaseClient
.from("tasks")
.select("*")
.eq("project_id",projectId)

let total = tasks.length
let comp = tasks.filter(x=>x.status=="Completed").length
let prog = tasks.filter(x=>x.status=="In Progress").length
let ns = tasks.filter(x=>x.status=="Not Started").length

document.getElementById("t1").innerHTML = total
document.getElementById("t2").innerHTML = comp
document.getElementById("t3").innerHTML = prog
document.getElementById("t4").innerHTML = ns

let percent = total==0 ? 0 : (comp/total)*100
document.getElementById("prog").style.width = percent+"%"

let thtml=""
tasks.forEach(t=>{
thtml+=`
<div class="task-row">
<div>${t.task_name}</div>
<div><span class="badge bg-secondary">${t.status}</span></div>
</div>
`
})
document.getElementById("tasks").innerHTML = thtml

let { data:sprints } = await supabaseClient
.from("sprints")
.select("*")
.eq("project_id",projectId)

let shtml=""
sprints.forEach(s=>{
shtml+=`
<div class="col-md-4">
<div class="sprint-card">
<b>${s.sprint_name}</b><br>
0/0 tasks done
</div>
</div>
`
})
document.getElementById("sprints").innerHTML = shtml

}

function openTasks(){
location.href="tasks.html?id="+projectId
}

function openKanban(){
location.href="kanban.html?id="+projectId
}

load()

</script>

</body>
</html>
