<!DOCTYPE html>
<html>
<head>
<title>Project Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/auth.js"></script>

<style>
body{
background:#f4f7fb;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Segoe UI;
}
.card{
width:420px;
padding:40px;
border-radius:16px;
box-shadow:0 25px 60px rgba(0,0,0,0.08);
}
</style>

</head>

<body>

<div class="card">

<h3 class="mb-4 text-center">Project Management Login</h3>

<input id="email" class="form-control mb-3" placeholder="Email">
<input id="password" type="password" class="form-control mb-3" placeholder="Password">

<button class="btn btn-primary w-100 mb-2" onclick="login()">Login</button>

<button class="btn btn-success w-100" onclick="signup()">Create Account</button>

</div>

<script>

function login(){
    let email = document.getElementById("email").value
    let password = document.getElementById("password").value
    loginUser(email,password)
}

function signup(){
    let email = document.getElementById("email").value
    let password = document.getElementById("password").value
    registerUser(email,password)
}

</script>

</body>
</html>
